L.push({c:"Course 1",l:"1-4",t:"Asset & Configuration Management Lifecycles",
s:`Asset（資産）とは intrinsic financial value（本質的な財務価値）を持つもの。CI（構成アイテム）とはサービス提供に必要で tracking（追跡管理）したいエンティティ。Asset は CI であることが多いが、CI は必ずしも Asset ではない（例：business service は CI だが Asset ではない）。

CI の種類：physical entities（computer・router など）と logical entities（データベースインスタンス・Tomcat など）。
Asset は financial value の管理 → Asset Management application で管理。
CI は operational use での tracking → CMDB に格納。

Asset は deploy（展開）されると CI になり、stock（在庫）に戻されるか dispose（廃棄）されるまで CI であり続ける。

Configuration Management：サービスデータと relationships の operational use に焦点。CI の status・attributes・relationships を追跡して IT 環境の正確な情報を維持。
IT Asset Management：procurement（調達）・cost management・depreciation（減価償却）・compliance・disposal（廃棄）の管理。

CSDM はライフサイクルのステージとステータスを整合させ hardware assets と CMDB の CI を同期させる。

両者は complementary（補完的）であり ITSM において統合されることが多い。目標は operational efficiency と financial accountability の両立。`,

L.push({c:"Course 1",l:"1-6",t:"Steps to Deploying a Trustworthy CMDB",
s:`key business initiatives と strategic IT initiatives を特定することが出発点。会社が既に使用している言語で表現することで faster buy-in が得られる。4つのステップは必ずしも linear（線形）ではない。

Step 1：Set Direction
clear goals・actionable objectives・measurable business outcomes から始める。What・How・Why・Measure の4つの問いに答える。reporting needs はデータ投入前の設計段階で決定する。方向性なしの構築は「flying while building a plane（飛行中に飛行機を組み立てる）」ようなもの。

Step 2：Build Team and Governance Model
Configuration Control Board（CCB・構成管理委員会）を結成。executives からの early buy-in が credibility・trust・adoption を向上。CMDB のデータは CMDB チームが所有しない。適切な data owners を特定しガバナンスに参加させることが不可欠。CMDB チームが検証できるのは duplicate records・missing attributes などの基本的なチェックのみ。

Step 3：Design Data Model
use cases を支援するデータのみを格納。out-of-the-box CI classes で fastest time to value を目指す（例：Firewall・Server・Application）。CSDM を理解し活用することを推奨。

Step 4：Operationalize and Govern
3本柱：Ingestion（データフローの自動化）・Governance（データの管理・維持）・Insight（データの可視化・活用）。「garbage in – garbage out」の原則を意識する。

導入効果：incident/problem/change/asset management の促進・strategic planning の支援・single source of truth による collaboration 強化・failed changes リスクの低減・audits の促進・root cause analysis の支援。`,

Ingestion ツール：
・ServiceNow Discovery（Horizontal/Agentless discovery）：自動ディスカバリー・インフラマッピング。有償（ITOM Visibility の一部）。non-discoverable data で補完が必要。
・Service Mapping（Top-down/ML powered mapping）：Top-Down Mapping・Dynamic Updates。有償（ITOM Visibility の一部）。CSDM ガイドライン準拠を推奨。
・Agent Client Collector（ACC/Agent based discovery）：エージェントインストール必須。software utilization data を収集。有償。
・Service Graph Connectors：Azure・InTune・MS SCCM・Jamf・AWS など。有償（SCCM のみ無償）。credentials 必要。
・IntegrationHub ETL：ETL 自動化。non-CMDB テーブルもサポート。無償（Store 経由）。
・Import Sets and Transform Maps：最古の方法。デフォルトで IRE を使用しない→transform map script で IRE 通過を強制することを推奨。無償。

Governance ツール：
・CMDB Health Dashboard：Completeness・Correctness・Compliance の3観点。scheduled jobs はデフォルトでオフ→手動アクティベートが必要。無償。
・CMDB Data Manager：Data Certification・Lifecycle Policies・Attestation Policies。無償。
・Duplicate CI Remediation Wizard：重複CIの自動検出・Merge/Delete。manual effort 必要。無償。
・De-Duplication Templates：スケジュール自動実行。公開前に in-depth testing を推奨。無償。

Insight ツール：
・CMDB Query Builder：drag-and-drop・AND/OR フィルタリング。無償。
・Unified Map：Interactive Visualization・Dependency Mapping。無償。
・Intelligent Search：NLQ（natural language query）による AI-Powered 検索。NLQ により必要スキルが大幅削減。無償。
・CMDB and CSDM Data Foundations Dashboards：Visibility・Policy Compliance・Playbooks。無償（Store 経由）。`,

s:`CI Class Manager は CMDB 内の CI とクラスを管理する centralized ツール。tree-view format でCMDBクラス階層を一元管理する。

主な利点：Centralized Management・Class Definitions and Settings（identification rules・reconciliation rules・CMDB Health）・Hierarchy and Relationships・Attributes and Rules Management・Health and Compliance（compliance audits・certification filters・templates）・Extensibility・Improved Data Accuracy

【重要】新しい CMDB クラスの作成は慎重に。ライセンス・governance・insight への影響あり。まず CMDB CI Class Models をインストールして既存クラスを確認し、必要なら既存クラスを extend することを推奨。作成権限：sn_cmdb_admin and personalize_dictionary または admin ロールのみ。

technical debt 解消：CI Class Manager で baseline class を特定し、CIをカスタムクラスから標準クラスへ attributes を正しくマッピングして移動。

Principal Class：ITSMレコードの「Configuration Item」参照フィールドに表示されるCIをフィルタリング。例：「Servers」を設定するとサーバー関連CIのみが表示される。

Managed By Group：technical service offering で設定した場合は CI Class Manager の設定より優先される。

Identification Rules：Name・Serial Number・Device ID・Object ID・Configuration file などで一意に識別。
Reconciliation Rules：どの discovery sources が特定のCI属性を更新できるかを指定。未承認ソースによる上書きを防止。Data refresh rules で上位優先度ソースが更新していない場合のデータ更新方法を管理。
Suggested Relationships：predefined recommendations。例：Provides Power for :: Receives Power From / Runs on :: Hosts。不適切例：a rack runs on a server / a server runs on a database。

従来の設定方法：application navigator から各アプリケーションに直接アクセス。複数テーブルの設定を single list view で確認したい場合に有用。`,

L.push({c:"Course 2",l:"2-2",t:"IRE（Identification and Reconciliation Engine）概要",
s:`IRE（Identification and Reconciliation Engine・識別と照合エンジン）は CMDBを維持するために payloads（ペイロード）を処理する framework。新しいCIの作成と既存CIの更新を担う。

複数ソース（Discovery・AWS・SCCM など）からのデータ取り込みで、最後に更新したソースによってデータ属性が flop back and forth（行き来）する問題が生じる。IRE はこの問題を解決する。

IRE は CMDB への healthy data 取り込みにおいて crucial（不可欠）な中心的コンポーネント。accurate and consistent data の確保・duplicate CIs の削減・CMDBの integrity の維持・unauthorized data sources からの更新の防止を実現。

4つのコア機能：
・Identification（識別）：CIがCMDB内に存在するか newly discovered CI かを判断。identification rules に基づいてattributes からCIを一意に識別
・Reconciliation（照合）：複数データソースからのCIデータを照合・統合
・Deduplication（重複排除）：重複CIを検出・解決（後続レッスンで詳細）
・Reclassification（再分類）：CIを適切なクラスに再分類（後続レッスンで詳細）

IRE は centralized set of APIs を提供。データソースは CMDB に直接書き込まず APIs を呼び出す→inconsistencies（不整合）を防止。

Identification Rules と Reconciliation Rules はデータ取り込み時に連携して duplicate CI records の防止・CI attributes の照合・authoritative data sources のみがCIを更新できることを確保する。`,

["IREの役割","healthy data のCMDBへの取り込みにおいて crucial（不可欠）な中心的コンポーネント","accurate and consistent data の確保・duplicate CIs の削減・integrity の維持"],
["コア機能①：Identification","CIがCMDB内に存在するか newly discovered CI かを判断","identification rules に基づいて attributes からCIを一意に識別"],

s:`Identification Rules（識別ルール）は CMDBの integrity と accuracy を確保するためにCIを一意に識別し duplicate records の作成を防止する。

Duplicate CIs：単一のCIを表す重複CIがCMDB内に存在する状態。
Overloaded CIs：逆の問題で、異なるCIが同一のCIとして識別され1つのCIしか作成されない状態。

Attribute Flapping（属性フラッピング）：複数のデータソースが同一属性を異なる値で更新し値が行き来する現象。reconciliation rules で防止できる。

// RENDER & SEND

// アプリ側ウィンドウの参照
let appWindow = null;

// アプリURLを同じリポジトリのindex.htmlと仮定（同一オリジン）
function getAppUrl(){
  const here = location.href;
  return here.replace('all_lessons_data.html','').replace(/\/$/, '') + '/';
}

// アプリを新しいタブで開く（または既存タブを使う）
function openApp(){
  appWindow = window.open(getAppUrl(), 'cmdb_study_app');
  showToast('アプリを開いています…タブが開いたら送信ボタンを押してください', '#1f6feb');
}

// 1レッスン送信
function sendLesson(idx, btnId){
  const l = L[idx];
  const payload = {
    type: 'CMDB_IMPORT_LESSON',
    lesson: {
      course: l.c, lesson: l.l, title: l.t,
      summary: l.s,
      points: l.p,
      quiz: l.q.map(q => ({
        type: q.t, q: q.q, opts: q.o, ans: q.a, exp: q.e
      }))
    }
  };

  if (!appWindow || appWindow.closed) {
    appWindow = window.open(getAppUrl(), 'cmdb_study_app');
    // ウィンドウが読み込まれてから送信
    const btn = document.getElementById(btnId);
    btn.textContent = '⏳ アプリ起動中…';
    setTimeout(() => {
      trySend(payload, btnId, 0);
    }, 2500);
  } else {
    trySend(payload, btnId, 0);
  }
}

// 全レッスン一括送信
function sendAll(btnId){
  const payload = {
    type: 'CMDB_IMPORT_ALL',
    lessons: L.map(l => ({
      course: l.c, lesson: l.l, title: l.t,
      summary: l.s, points: l.p,
      quiz: l.q.map(q => ({ type: q.t, q: q.q, opts: q.o, ans: q.a, exp: q.e }))
    }))
  };

  if (!appWindow || appWindow.closed) {
    appWindow = window.open(getAppUrl(), 'cmdb_study_app');
    const btn = document.getElementById(btnId);
    btn.textContent = '⏳ アプリ起動中…';
    setTimeout(() => { trySend(payload, btnId, 0); }, 2500);
  } else {
    trySend(payload, btnId, 0);
  }
}

function trySend(payload, btnId, retry){
  try {
    appWindow.postMessage(payload, '*');
    const btn = document.getElementById(btnId);
    if(btn){ btn.textContent = '✅ 送信完了！'; btn.classList.add('cp');
      setTimeout(()=>{ btn.textContent = btn.dataset.orig || '🚀 アプリへ送信'; btn.classList.remove('cp'); }, 3000); }
  } catch(e) {
    if(retry < 3){ setTimeout(()=>trySend(payload, btnId, retry+1), 800); }
    else { showToast('送信に失敗しました。アプリタブを開いてから再試行してください', '#da3633'); }
  }
}

function showToast(msg, color='#58a6ff'){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:20px;right:20px;background:#21262d;border:1px solid ${color};color:#e6edf3;padding:10px 18px;border-radius:8px;font-size:13px;z-index:300;`;
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// postMessage 完了受信
window.addEventListener('message', e => {
  if(e.data?.type==='CMDB_IMPORT_DONE') showToast(`✅ 「${e.data.title}」をアプリに追加しました`);
  if(e.data?.type==='CMDB_IMPORT_ALL_DONE') showToast(`✅ ${e.data.count}レッスンをアプリに追加しました`);
});

// ── DOM 構築 ──────────────────────────────────
const cnt=document.getElementById('cnt');
const courses={};
L.forEach(l=>{if(!courses[l.c])courses[l.c]=[];courses[l.c].push(l);});

// 一括送信ボタン
const allRow = document.createElement('div');
allRow.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap;';
allRow.innerHTML=`
  <button class="btn btnp" style="padding:8px 20px;font-size:13px;" onclick="openApp()">🔗 アプリを開く</button>
  <button class="btn" id="send_all" data-orig="🚀 全レッスンをアプリへ送信" style="padding:8px 20px;font-size:13px;border-color:#3fb950;color:#3fb950;" onclick="sendAll('send_all')">🚀 全レッスンをアプリへ送信</button>
  <span style="font-size:11px;color:#6e7681;">※先に「アプリを開く」でアプリタブを開いてから送信してください</span>
`;
cnt.appendChild(allRow);

Object.entries(courses).forEach(([course,lessons])=>{
  const sec=document.createElement('div');
  sec.className='stitle';sec.textContent=course;
  cnt.appendChild(sec);

  lessons.forEach((l,idx)=>{
    const globalIdx=L.indexOf(l);
    const bid=`${course.replace(/\s/g,'')}_${l.l.replace(/\./g,'')}_${idx}`;
    const block=document.createElement('div');
    block.className='lb';
    block.innerHTML=`
      <div class="lh">
        <span class="chip">${l.c} · ${l.l}</span>
        <span class="lt">${l.t}</span>
        <span class="qc">${l.q.length}問 / ポイント${l.p.length}行</span>
      </div>
      <div class="br" style="margin-top:8px;">
        <button class="btn btnp" id="send_${bid}" data-orig="🚀 アプリへ送信"
          onclick="sendLesson(${globalIdx},'send_${bid}')">🚀 アプリへ送信</button>
      </div>
    `;
    cnt.appendChild(block);
  });
});
</script>
